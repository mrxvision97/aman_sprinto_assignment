# For Railway services whose root directory is the repo (not `backend/`).
# If your service "Root Directory" is already `backend`, Railway uses `backend/railway.toml` instead.

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
